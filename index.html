<title>Make a List</title>

<script>
// App icon
(function(){
  try {
    const c=document.createElement('canvas'); c.width=180; c.height=180;
    const x=c.getContext('2d');
    const bg=x.createLinearGradient(0,0,180,180);
    bg.addColorStop(0,'#1a1a2e'); bg.addColorStop(0.5,'#16213e'); bg.addColorStop(1,'#0f3460');
    const r=36; x.beginPath();
    x.moveTo(r,0); x.lineTo(180-r,0); x.quadraticCurveTo(180,0,180,r);
    x.lineTo(180,180-r); x.quadraticCurveTo(180,180,180-r,180);
    x.lineTo(r,180); x.quadraticCurveTo(0,180,0,180-r);
    x.lineTo(0,r); x.quadraticCurveTo(0,0,r,0);
    x.closePath(); x.fillStyle=bg; x.fill();
    // Three list lines
    [[38,60],[38,90],[38,120]].forEach(([y],i)=>{
      x.beginPath(); x.moveTo(38,y); x.lineTo(142,y);
      x.strokeStyle='rgba(255,255,255,0.85)'; x.lineWidth=10; x.lineCap='round'; x.stroke();
      // dot
      x.beginPath(); x.arc(28,y,6,0,Math.PI*2);
      x.fillStyle=i===0?'#34c759':'rgba(255,255,255,0.5)'; x.fill();
    });
    const url=c.toDataURL('image/png');
    document.getElementById('apple-icon').href=url;
    const fav=document.createElement('link'); fav.rel='icon'; fav.type='image/png'; fav.href=url;
    document.head.appendChild(fav);
  } catch(e){}
})();
</script>

<style>

/* ══════════════════════════════════════

══════════════════════════════════════ */

}

.list-card-name{font-size:17px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.list-card-chevron{color:rgba(255,255,255,0.25);font-size:18px;flex-shrink:0}
/* Swipe-delete styles removed */

/* List card swipe-to-delete */
.lc-wrap{position:relative;margin-bottom:12px;border-radius:18px;overflow:hidden}
.lc-del-bg{
  position:absolute;right:0;top:0;bottom:0;width:90px;
  background:#ff3b30;display:flex;align-items:center;justify-content:center;

}

/* New list modal */

/* Search */

/* Add row */
.add-row{padding:12px 16px 8px;display:flex;gap:10px;flex-shrink:0}

.add-btn{background:linear-gradient(135deg,#007aff,#5856d6);border:none;border-radius:12px;width:46px;height:46px;cursor:pointer;color:#fff;font-size:24px;font-weight:300;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 16px rgba(0,122,255,0.4)}

/* Scrollable list area */
#list-scroll{flex:1;overflow-y:auto;padding:4px 16px 0;-webkit-overflow-scrolling:touch}

.item-del-btn:active{opacity:1}
.row-wrap{margin-bottom:8px;position:relative;border-radius:14px;overflow:hidden}
.item-del-bg{

}
.item-del-bg span{color:#fff;font-size:13px;font-weight:700}

.task-row{

}
.task-row.is-image{align-items:flex-start;padding:12px}

}

.img-wrapper{position:relative;margin-bottom:8px}

.caption-input{width:100%;background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,0.12);padding:4px 0;color:rgba(255,255,255,0.65);font-size:13px;outline:none;-webkit-user-select:text;user-select:text}
.caption-input.done{color:rgba(255,255,255,0.3);text-decoration:line-through}
mark{background:rgba(0,122,255,0.45);color:#fff;border-radius:3px;padding:0 1px}

.drag-handle{cursor:grab;flex-shrink:0;line-height:0;padding:4px 2px 4px 4px;touch-action:none}

<!-- ═══════════════════════════════════════
     SCREEN 1 — ALL LISTS
═══════════════════════════════════════ -->
<div class="screen" id="lists-screen">
  <div class="header" style="padding:28px 24px 8px;flex-shrink:0;display:flex;justify-content:space-between;align-items:flex-start">
    <div>
      <h1 style="font-size:34px;font-weight:700;letter-spacing:-1px">Make a List</h1>
      <div style="margin-top:4px;font-size:14px;color:rgba(255,255,255,0.4)" id="lists-subtitle">0 lists</div>
    </div>
    <button class="dbx-nav-btn" id="dbx-open-btn-home" onclick="openDbxPanel()" style="margin-top:8px">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M6 2L12 6.5L6 11L0 6.5L6 2Z" fill="currentColor"/>

<script>
'use strict';

// ══════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════
const DROPBOX_APP_KEY     = 'eaq9aw52p6mjvk3';
const DROPBOX_BACKUP_PATH = '/mylists-backup.json';

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
// lists: [{ id, name, icon, items:[{id,text,done,image}] }]
let lists    = [];
let nextListId = 1;
let nextItemId = 1;
let activeListId = null;  // which list is open
let search   = '';
let dbxToken = null;
let dbxStatus = null;
let dbxMessage = '';

// ── Default lists so the app isn't empty on first launch
const DEFAULT_LISTS = [];

// ══════════════════════════════════════════
//  PERSISTENCE
// ══════════════════════════════════════════

// Upload a single file to Dropbox
async function dbxUpload(path, content, isText) {
  return fetch('https://content.dropboxapi.com/2/files/upload', {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${dbxToken}`,
      'Dropbox-API-Arg': JSON.stringify({path, mode:'overwrite', autorename:false, mute:true}),
      'Content-Type': 'application/octet-stream',
    },
    body: isText ? content : JSON.stringify(content),
  });
}

// Delete a file from Dropbox (used when a list is deleted)
async function dbxDelete(path) {
  return fetch('https://api.dropboxapi.com/2/files/delete_v2', {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${dbxToken}`,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({path}),
  }).catch(()=>{});
}

// Format a list as a readable plain text file
function listToText(list) {
  const date = new Date(list.createdAt||Date.now()).toLocaleDateString(undefined,{year:'numeric',month:'long',day:'numeric'});
  const active = list.items.filter(i=>!i.done);
  const done   = list.items.filter(i=> i.done);
  let txt = `${list.icon}  ${list.name}\n`;
  txt += `Created: ${date}\n`;
  txt += `${'─'.repeat(30)}\n\n`;
  if (active.length) {
    active.forEach(i => { txt += `☐  ${i.text || '(image item)'}\n`; });
  }
  if (done.length) {
    txt += `\n── Completed ──\n`;
    done.forEach(i => { txt += `☑  ${i.text || '(image item)'}\n`; });
  }
  if (!list.items.length) txt += '(empty list)\n';
  txt += `\n${'─'.repeat(30)}\n`;
  txt += `Backed up: ${new Date().toLocaleString()}\n`;
  return txt;
}

// Safe filename from list name
function safeFilename(name) {
  return name.replace(/[^a-zA-Z0-9 _-]/g,'').trim().replace(/\s+/g,' ') || 'list';
}

// Auto-backup timer
let autoBackupTimer = null;
function scheduleAutoBackup() {
  if (!dbxToken) return;
  clearTimeout(autoBackupTimer);
  autoBackupTimer = setTimeout(async () => {
    try {
      // 1. Save the machine-readable restore file
      await dbxUpload(DROPBOX_BACKUP_PATH, {lists, nextListId, nextItemId, savedAt: new Date().toISOString()});
      // 2. Save each list as a readable .txt file
      for (const list of lists) {
        const fname = `/Lists/${safeFilename(list.name)}.txt`;
        await dbxUpload(fname, listToText(list), true);
      }
      // Show confirmation
      const lbl = document.getElementById('dbx-btn-label');
      const homeLbl = document.getElementById('dbx-home-label');
      if (lbl) { lbl.textContent = '✓'; setTimeout(() => { lbl.textContent = '●'; }, 2000); }
      if (homeLbl) { homeLbl.textContent = '✓'; setTimeout(() => { homeLbl.textContent = '●'; }, 2000); }
    } catch(e) {}
  }, 3000);
}

function save() {
  try { localStorage.setItem('mylists_data', JSON.stringify({lists,nextListId,nextItemId})); } catch(e){}
  scheduleAutoBackup();
}
function load() {
  try {
    const raw = localStorage.getItem('mylists_data');
    if (raw) {
      const d = JSON.parse(raw);
      if (d.lists && d.lists.length) {
        lists = d.lists; nextListId = d.nextListId||100; nextItemId = d.nextItemId||100;
        return;
      }
    }
  } catch(e){}
  // First run — use defaults
  lists = JSON.parse(JSON.stringify(DEFAULT_LISTS));
  nextListId = 3; nextItemId = 10;
}

// ══════════════════════════════════════════
// ══════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function highlight(text,q){
  if(!q||!text) return esc(text||'');
  const idx=text.toLowerCase().indexOf(q.toLowerCase());
  if(idx===-1) return esc(text);
  return esc(text.slice(0,idx))+'<mark>'+esc(text.slice(idx,idx+q.length))+'</mark>'+esc(text.slice(idx+q.length));
}
function getList(id){ return lists.find(l=>l.id===id); }
function activeList(){ return getList(activeListId); }

// ══════════════════════════════════════════
//  SCREEN NAVIGATION
// ══════════════════════════════════════════
function showListsScreen() {
  document.getElementById('lists-screen').classList.remove('hidden');
  document.getElementById('detail-screen').classList.add('hidden');
  activeListId = null; search = '';
  renderListsScreen();
}

function openList(listId) {
  activeListId = listId;
  document.getElementById('lists-screen').classList.add('hidden');
  const det = document.getElementById('detail-screen');
  det.classList.remove('hidden','slide-back');
  void det.offsetWidth;
  det.style.animation='none'; void det.offsetWidth;
  det.style.animation='slideInRight 0.28s ease';
  search = '';
  const si = document.getElementById('smart-input');
  if(si){ si.value=''; }
  const hint = document.getElementById('smart-hint');
  if(hint) hint.style.display = 'none';
  renderDetailScreen();
}

function goBack() {
  const det = document.getElementById('detail-screen');
  det.style.animation = 'slideInLeft 0.22s ease reverse';
  setTimeout(() => {
    det.style.animation = '';
    showListsScreen();
  }, 200);
}

// ══════════════════════════════════════════
//  LISTS SCREEN
// ══════════════════════════════════════════
const EMOJIS = ['📝','🏠','💼','🛒','🎯','💪','📚','🎨','🍕','✈️','💡','🎵'];
let selectedEmoji = EMOJIS[0];
let listsSearch = '';

function onListsSearch(inp){
  listsSearch = inp.value;
  inp.classList.toggle('has-text', !!listsSearch);
  document.getElementById('lists-search-clear').classList.toggle('visible', !!listsSearch);
  renderListsScreen();
}
function clearListsSearch(){
  listsSearch = '';
  const inp = document.getElementById('lists-search-input');
  if(inp){ inp.value=''; inp.classList.remove('has-text'); }
  document.getElementById('lists-search-clear').classList.remove('visible');
  renderListsScreen();
}

function openDbxPanel(){document.getElementById('dbx-overlay').classList.add('open');renderDbxPanel();}

function renderListsScreen() {
  // Sort by createdAt ascending (oldest first = order added)
  const sorted = [...lists].sort((a,b) => (a.createdAt||0) - (b.createdAt||0));

  // Filter by search
  const q = listsSearch.trim().toLowerCase();
  const filtered = q ? sorted.filter(l => l.name.toLowerCase().includes(q)) : sorted;

  const sub = document.getElementById('lists-subtitle');
  sub.textContent = lists.length === 1 ? '1 list' : lists.length + ' lists';

  const con = document.getElementById('lists-container');
  if (!lists.length) {
    con.innerHTML = '<div class="empty">No lists yet.<br>Tap "New List" to get started.</div>';
    return;
  }
  if (!filtered.length) {
    con.innerHTML = `<div class="empty">No lists matching "${esc(listsSearch)}"</div>`;
    return;
  }

  con.innerHTML = filtered.map(l => {
    const remaining = l.items.filter(i=>!i.done).length;

// ── List card swipe-to-delete ─────────────────────────────────────────────────
const lcSwipeState = {};

function lcTap(e, id) {
  // If card was swiped open, first tap snaps it shut
  const s = lcSwipeState[id];
  if (s && s.open) {
    lcSnapShut(id);
    e.stopPropagation();
    return;
  }
  openList(id);
}

function lcSwipeStart(e, id) {
  // Close any other open cards first
  Object.keys(lcSwipeState).forEach(k => {
    if (parseInt(k) !== id && lcSwipeState[k].open) lcSnapShut(parseInt(k));
  });
  lcSwipeState[id] = {
    startX: e.touches[0].clientX,
    startY: e.touches[0].clientY,
    dx: 0, open: false, cancelled: false, locked: false
  };
}

function lcSwipeMove(e, id) {
  const s = lcSwipeState[id];
  if (!s || s.cancelled) return;
  const dx = e.touches[0].clientX - s.startX;
  const dy = e.touches[0].clientY - s.startY;
  if (!s.locked && Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 6) { s.cancelled = true; return; }
  if (dx > 0) return;
  if (Math.abs(dx) > 5) s.locked = true;
  if (!s.locked) return;
  e.preventDefault();
  s.dx = dx;
  const card = document.getElementById('lc-' + id);
  const wrap = document.getElementById('lcw-' + id);
  const bg   = wrap ? wrap.querySelector('.lc-del-bg') : null;
  if (card) {
    card.style.transition = 'none';
    card.style.transform = `translateX(${Math.max(dx, -90)}px)`;
  }
  if (bg) {
    // Fade in red as card slides, fully visible at 90px
    bg.style.opacity = Math.min(Math.abs(dx) / 60, 1);
  }
}

function lcSwipeEnd(e, id) {
  const s = lcSwipeState[id];
  if (!s) return;
  const card = document.getElementById('lc-' + id);
  const wrap = document.getElementById('lcw-' + id);
  const bg   = wrap ? wrap.querySelector('.lc-del-bg') : null;
  if (!s.cancelled && s.dx < -40) {
    if (card) { card.style.transition = 'transform 0.22s ease'; card.style.transform = 'translateX(-90px)'; }
    if (bg)   { bg.style.transition = 'opacity 0.22s'; bg.style.opacity = '1'; }
    s.open = true;
  } else {
    lcSnapShut(id);
  }
}

function lcSnapShut(id) {
  const card = document.getElementById('lc-' + id);
  const wrap = document.getElementById('lcw-' + id);
  const bg   = wrap ? wrap.querySelector('.lc-del-bg') : null;
  if (card) { card.style.transition = 'transform 0.22s ease'; card.style.transform = ''; }
  if (bg)   { bg.style.transition = 'opacity 0.22s'; bg.style.opacity = '0'; }
  if (lcSwipeState[id]) lcSwipeState[id].open = false;
}

  const matchFn = item => {
    if(!q) return true;
    if(item.text && item.text.toLowerCase().includes(q)) return true;
    if(item.image && ['image','photo','picture'].some(w=>w.includes(q))) return true;
    return false;

//  DRAG TO REORDER
// ══════════════════════════════════════════
let drag=null;

function getDraggableIds(){
  const list=activeList(); if(!list) return [];
  return list.items.filter(i=>!i.done&&(search?matchItem(i):true)).map(i=>i.id);
}
function matchItem(item){
  const q=search.toLowerCase();
  if(item.text&&item.text.toLowerCase().includes(q)) return true;
  if(item.image&&['image','photo','picture'].some(w=>w.includes(q))) return true;
  return false;
}

function startDrag(e,id,index){
  if(drag) return;
  e.preventDefault();
  const clientY=e.touches?e.touches[0].clientY:e.clientY;
  const srcEl=document.getElementById('task-'+id); if(!srcEl) return;
  const rect=srcEl.getBoundingClientRect();
  const ghost=srcEl.cloneNode(true);
  ghost.id='drag-ghost';
  ghost.style.cssText=`position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;margin:0;z-index:999;pointer-events:none;box-shadow:0 12px 40px rgba(0,0,0,0.55);transform:scale(1.03);opacity:0.95;border-radius:14px;transition:none;background:rgba(255,255,255,0.16)`;
  document.body.appendChild(ghost);
  srcEl.style.opacity='0';
  srcEl.style.pointerEvents='none';
  drag={id,fromIndex:index,toIndex:index,ghost,ghostTop:rect.top,startY:clientY,rowIds:getDraggableIds()};
  updateDropLine(index,index);
}

function onDragMove(e){
  if(!drag) return;
  e.preventDefault();
  const clientY=e.touches?e.touches[0].clientY:e.clientY;
  drag.ghost.style.top=(drag.ghostTop+(clientY-drag.startY))+'px';
  const ghostCY=drag.ghostTop+(clientY-drag.startY)+drag.ghost.offsetHeight/2;
  let best=drag.toIndex, bestDist=Infinity;
  drag.rowIds.forEach((rid,i)=>{
    if(rid===drag.id) return;
    const el=document.getElementById('task-'+rid); if(!el) return;
    const r=el.getBoundingClientRect();
    const dist=Math.abs(ghostCY-(r.top+r.height/2));
    if(dist<bestDist){bestDist=dist;best=i;}
  });
  const lastId=drag.rowIds[drag.rowIds.length-1];
  if(lastId&&lastId!==drag.id){
    const lel=document.getElementById('task-'+lastId);
    if(lel){const r=lel.getBoundingClientRect();if(ghostCY>r.bottom-4)best=drag.rowIds.length-1;}
  }
  if(best!==drag.toIndex){drag.toIndex=best;updateDropLine(drag.fromIndex,drag.toIndex);}
}

function updateDropLine(from,to){
  const old=document.getElementById('drop-line'); if(old) old.remove();
  if(!drag) return;
  const insertBefore=to>from?to+1:to;
  const scroll=document.getElementById('list-scroll');
  const rows=Array.from(scroll.querySelectorAll('.task-row')).filter(r=>r.id!=='task-'+drag.id);
  const line=document.createElement('div'); line.id='drop-line'; line.className='drop-line';
  if(insertBefore>=rows.length){
    const last=rows[rows.length-1];
    if(last) last.parentElement.after(line); else scroll.appendChild(line);
  } else {
    rows[insertBefore].parentElement.before(line);
  }
}

function onDragEnd(){
  if(!drag) return;
  drag.ghost.remove();
  const line=document.getElementById('drop-line'); if(line) line.remove();
  const srcEl=document.getElementById('task-'+drag.id);
  if(srcEl){srcEl.style.opacity='';srcEl.style.pointerEvents='';}
  if(drag.toIndex!==drag.fromIndex){
    const list=activeList();
    if(list){
      const rowIds=drag.rowIds;
      const movedItem=list.items.find(i=>i.id===drag.id);
      if(movedItem){
        const fromReal=list.items.indexOf(movedItem);
        list.items.splice(fromReal,1);
        const targetId=rowIds[drag.toIndex];
        const neighbour=list.items.find(i=>i.id===targetId);
        let ins=neighbour?list.items.indexOf(neighbour):list.items.length;
        if(drag.toIndex>drag.fromIndex) ins++;
        ins=Math.max(0,Math.min(ins,list.items.length));
        list.items.splice(ins,0,movedItem);
        save();
      }
    }
  }
  drag=null; renderDetailScreen();
}

window.addEventListener('mousemove', onDragMove);
window.addEventListener('mouseup',   onDragEnd);
window.addEventListener('touchmove', onDragMove,{passive:false});
window.addEventListener('touchend',  onDragEnd);

//  DROPBOX
// ══════════════════════════════════════════
(function(){
  const hash=window.location.hash;
  if(hash){
    const p=new URLSearchParams(hash.replace('#','?'));
    const t=p.get('access_token');
    if(t){dbxToken=t;sessionStorage.setItem('dbx_token',t);window.history.replaceState(null,'',window.location.pathname);}
  }
  if(!dbxToken) dbxToken=sessionStorage.getItem('dbx_token');
})();

const appKeyMissing=()=>DROPBOX_APP_KEY==='YOUR_DROPBOX_APP_KEY';
function startDropboxOAuth(){
  const red=encodeURIComponent(window.location.href.split('#')[0]);
  window.location.href=`https://www.dropbox.com/oauth2/authorize?client_id=${DROPBOX_APP_KEY}&response_type=token&redirect_uri=${red}`;
}
async function handleBackup(){
  dbxStatus='saving';dbxMessage='Saving to Dropbox…';renderDbxPanel();
  try{
    // 1. Save machine-readable restore file
    const res=await dbxUpload(DROPBOX_BACKUP_PATH, {lists,nextListId,nextItemId,savedAt:new Date().toISOString()});
    if(!res.ok) throw new Error(await res.text());
    // 2. Save each list as a readable .txt file in a Lists/ folder
    for(const list of lists){
      const fname=`/Lists/${safeFilename(list.name)}.txt`;
      await dbxUpload(fname, listToText(list), true);
    }
    dbxStatus='saved';dbxMessage='✓ Saved to Dropbox!';
    setTimeout(()=>{dbxStatus=null;dbxMessage='';renderDbxPanel();},3000);
  }catch(err){dbxStatus='error';dbxMessage='Error: '+err.message;}
  renderDbxPanel();
}
async function handleRestore(){
  dbxStatus='restoring';dbxMessage='Restoring from Dropbox…';renderDbxPanel();
  try{
    const res=await fetch('https://content.dropboxapi.com/2/files/download',{
      method:'POST',
      headers:{'Authorization':`Bearer ${dbxToken}`,'Dropbox-API-Arg':JSON.stringify({path:DROPBOX_BACKUP_PATH})},
    });
    if(!res.ok) throw new Error(await res.text());
    const data=await res.json();
    if(data&&data.lists){
      lists=data.lists;nextListId=data.nextListId||100;nextItemId=data.nextItemId||100;
      save();
      const d=data.savedAt?new Date(data.savedAt).toLocaleDateString():'';
      dbxStatus='saved';dbxMessage=`✓ Restored ${lists.length} lists${d?' (saved '+d+')':''}`;
      setTimeout(()=>{dbxStatus=null;dbxMessage='';renderDbxPanel();},4000);
      renderDetailScreen(); renderListsScreen();
    }
  }catch(err){dbxStatus='error';dbxMessage=err.message.includes('not_found')?'No backup found yet.':'Error: '+err.message;}
  renderDbxPanel();
}
function handleDisconnect(){sessionStorage.removeItem('dbx_token');dbxToken=null;dbxStatus=null;dbxMessage='';renderDbxPanel();}
function updateDbxButtons() {
  // Detail screen button
  const lbl = document.getElementById('dbx-btn-label');
  const btn = document.getElementById('dbx-open-btn');
  if (lbl) lbl.textContent = dbxToken ? '●' : 'Backup';
  if (btn) btn.classList.toggle('connected', !!dbxToken);
  // Home screen button
  const homeLbl = document.getElementById('dbx-home-label');
  const homeBtn = document.getElementById('dbx-open-btn-home');
  if (homeLbl) homeLbl.textContent = dbxToken ? '●' : 'Backup';
  if (homeBtn) homeBtn.classList.toggle('connected', !!dbxToken);
}
function closeDbxPanel(){document.getElementById('dbx-overlay').classList.remove('open');}
function dbxOverlayClick(e){if(e.target===document.getElementById('dbx-overlay'))closeDbxPanel();}

function dbxSVG(){return`<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M6 2L12 6.5L6 11L0 6.5L6 2Z" fill="white" opacity="0.9"/><path d="M18 2L24 6.5L18 11L12 6.5L18 2Z" fill="white" opacity="0.9"/><path d="M0 13.5L6 9L12 13.5L6 18L0 13.5Z" fill="white" opacity="0.9"/><path d="M24 13.5L18 9L12 13.5L18 18L24 13.5Z" fill="white" opacity="0.9"/><path d="M6 19.5L12 15L18 19.5L12 24L6 19.5Z" fill="white" opacity="0.9"/></svg>`;}

function renderDbxPanel(){
  const body=document.getElementById('dbx-panel-body');
  let html='';
  if(appKeyMissing()){
    html=`<div class="dbx-notice warning"><div class="ntitle">⚙️ One-time setup needed</div><div class="nbody">To enable Dropbox backup (~2 min):</div></div>
    <div class="dbx-step"><div class="dbx-step-num">1</div><div class="dbx-step-text">Go to <a href="https://www.dropbox.com/developers/apps" target="_blank">dropbox.com/developers/apps</a> → "Create app"</div></div>
    <div class="dbx-step"><div class="dbx-step-num">2</div><div class="dbx-step-text">Choose <b>Scoped access → Full Dropbox</b></div></div>
    <div class="dbx-step"><div class="dbx-step-num">3</div><div class="dbx-step-text">Add this page's URL under <b>OAuth 2 → Redirect URIs</b></div></div>
    <div class="dbx-step"><div class="dbx-step-num">4</div><div class="dbx-step-text">Paste your <b>App Key</b> where it says <code>YOUR_DROPBOX_APP_KEY</code> in the file</div></div>`;
  } else if(!dbxToken){
    html=`<div class="dbx-desc">Connect Dropbox to back up all your lists.</div>
    <button class="connect-btn" onclick="startDropboxOAuth()">${dbxSVG()} Connect to Dropbox</button>`;
  } else {
    const busy=dbxStatus==='saving'||dbxStatus==='restoring';
    const msg=dbxMessage?`<div class="dbx-notice ${dbxStatus==='error'?'error':'info'}">${esc(dbxMessage)}</div>`:'';
    html=`<div class="dbx-notice success"><div class="green-dot"></div><span>Connected to Dropbox</span></div>
    ${msg}
    <button class="primary-btn" onclick="handleBackup()" ${busy?'disabled':''}>${dbxStatus==='saving'?'Saving…':'☁️  Save now'}</button>
      <div style="text-align:center;font-size:12px;color:rgba(255,255,255,0.35);margin-top:-4px;margin-bottom:16px">Auto-saves 3 seconds after every change</div>
    <button class="secondary-btn" onclick="handleRestore()" ${busy?'disabled':''}>${dbxStatus==='restoring'?'Restoring…':'⬇️  Restore from Dropbox'}</button>
    <div class="dbx-path-note">Saved to <code>${DROPBOX_BACKUP_PATH}</code> in your Dropbox.</div>
    <button class="disconnect-btn" onclick="handleDisconnect()">Disconnect Dropbox</button>`;
  }
  body.innerHTML=html;
  updateDbxButtons();
}

// ══════════════════════════════════════════
//  SERVICE WORKER
// ══════════════════════════════════════════
(function(){
  if(!('serviceWorker' in navigator)) return;
  const sw=`const C='lists-v1';self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll([self.location.pathname])));self.skipWaiting();});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(k=>Promise.all(k.filter(n=>n!==C).map(n=>caches.delete(n)))));self.clients.claim();});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));});`;
  const url=URL.createObjectURL(new Blob([sw],{type:'application/javascript'}));
  navigator.serviceWorker.register(url,{scope:'./'}).catch(()=>{});
})();
